name: build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # usa yml en root de rama main de repo llamado jinja....
      - name: Run portfolio action
        uses: araceliponce-es/jinja2portfolio@main
        with:
          gh_token: ${{ secrets.GH_TOKEN }}
          gh_username: ${{ github.actor }}

      # 3. Deploy a GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          # La carpeta generada por tu action
          # Si quieres que vaya al root de gh-pages, asegúrate que tu action lo genere ahí
          path: ./
